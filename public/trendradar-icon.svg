<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409EFF"/>
      <stop offset="100%" stop-color="#337ECC"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- 雷达扫描线 -->
  <g transform="translate(256,256)">
    <circle cx="0" cy="0" r="48" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="6"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="4"/>
    <circle cx="0" cy="0" r="152" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="3"/>
    <circle cx="0" cy="0" r="200" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <!-- 十字线 -->
    <line x1="0" y1="-200" x2="0" y2="200" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <line x1="-200" y1="0" x2="200" y2="0" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <!-- 扫描扇形 -->
    <path d="M0,0 L140,-80 A160,160 0 0,1 140,80 Z" fill="rgba(255,255,255,0.25)"/>
    <!-- 中心点 -->
    <circle cx="0" cy="0" r="12" fill="white"/>
  </g>
  <!-- 箭头趋势线 -->
  <polyline points="280,100 340,70 400,90" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="150,360 200,340 260,300" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
